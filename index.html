<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peta Interaktif Batas Desa & SLS</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; }
        #map { width: 100vw; height: 100vh; }
        
        /* Spinner Overlay */
        #loader-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #4285F4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #gear-btn {
            position: absolute; bottom: 25px; right: 25px; z-index: 1000;
            background: white; border: 2px solid #555; border-radius: 50%;
            width: 55px; height: 55px; display: flex; align-items: center;
            justify-content: center; font-size: 28px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: all 0.2s;
        }

        #settings-panel {
            position: absolute; bottom: 95px; right: 25px; z-index: 1000;
            background: white; border-radius: 12px; box-shadow: 0 6px 25px rgba(0,0,0,0.35);
            padding: 20px; width: 300px; display: none; flex-direction: column; gap: 12px;
            max-height: 80vh; overflow-y: auto;
        }
        
        #settings-panel h3 { margin: 5px 0 8px 0; text-align: center; color: #333; font-size: 14px; border-top: 1px solid #eee; padding-top: 8px; }
        
        .filter-group { display: flex; flex-direction: column; gap: 8px; }
        .filter-group select { 
            padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; width: 100%;
        }

        .checkbox-group { 
            display: flex; flex-direction: column; gap: 8px; margin-top: 5px; 
            max-height: 300px; overflow-y: auto; padding-right: 5px;
        }
        .checkbox-item { 
            display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; 
        }

        #reset-filter {
            padding: 8px 12px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }

        #locate-btn {
            position: absolute; top: 100px; left: 10px; z-index: 1000;
            background: white; border: 2px solid rgba(0,0,0,0.2); border-radius: 4px;
            width: 48px; height: 48px; display: flex; align-items: center;
            justify-content: center; font-size: 18px; cursor: pointer;
        }

        #info-box {
            position: absolute; bottom: 25px; left: 25px; z-index: 1000;
            background: rgba(0, 0, 0, 0.5);
            color: white; padding: 15px; border-radius: 8px; 
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 14px; 
            letter-spacing: -0.2px;
            line-height: 1.4; pointer-events: auto; display: none; min-width: 200px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.9);
        }

        .copy-btn {
            cursor: pointer; margin-left: 8px; font-size: 12px; vertical-align: middle;
            background: rgba(255,255,255,0.2); padding: 2px 5px; border-radius: 4px;
        }

        #toast {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.3); color: white; padding: 12px 20px;
            border-radius: 10px; z-index: 2000; display: none; font-size: 14px;
        }

        .active-label {
            background: rgba(0, 0, 0, 0.2);
            color: #00FF00;
            border: none;
            box-shadow: none;
            font-size: 13px;
            font-weight: bold;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.8);
            padding: 2px 4px;
            border-radius: 4px;
        }
        .active-label::before { display: none; }
    </style>
</head>
<body>
    <div id="loader-overlay">
        <div class="spinner"></div>
        <p id="loader-text" style="font-weight: bold; color: #333;">Memvalidasi Akses...</p>
    </div>

    <div id="map"></div>
    <div id="info-box"></div>
    <div id="toast">Berhasil disalin</div>

    <div id="gear-btn" title="Pengaturan Filter">⚙</div>
    <div id="locate-btn" title="Lokasi Saya">📍</div>

    <div id="settings-panel">
        <h3>Filter Wilayah</h3>
        <div class="filter-group">
            <select id="sel-kec"><option value="">-- Pilih Kecamatan --</option></select>
        </div>

        <div id="desa-checkbox-container" style="display:none;">
            <h3>Desa dalam Kecamatan</h3>
            <div class="checkbox-group" id="desa-checkboxes"></div>
        </div>

        <button id="reset-filter">Reset Filter</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    
    <script>
        const SB_URL = "https://dephwldquypktcflpuon.supabase.co";
        let SB_KEY = "";
        let supabaseClient = null;

        const map = L.map('map', { zoomControl: true }).setView([-2.5489, 118.0149], 16);
        let slsLayer = null, userMarker = null, selectedLayer = null;
        let activeLabelGroup = L.layerGroup().addTo(map);
        let allFeatures = [];
        let supabaseData = [];
        let currentKecFilter = null;
        let currentDesaFilters = new Set();

        const baseLayers = {
            "OpenStreetMap": L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map),
            "Google Satellite": L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}'),
            "Google Hybrid": L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}'),
            "Google Street": L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}'),
            "ESRI Satellite": L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}')
        };
        L.control.layers(baseLayers, null, { position: 'topright' }).addTo(map);

        const slsStyle = { color: '#FF0000', weight: 2.5, opacity: 1, fillOpacity: 0 };
        const slsHighlightStyle = { color: '#FFFF00', weight: 5, opacity: 1, fillOpacity: 0.05 };

        async function validateAndStart() {
            let savedKey = localStorage.getItem("sb_key");
            const loader = document.getElementById('loader-overlay');
            const loaderText = document.getElementById('loader-text');

            while (true) {
                if (!savedKey) {
                    savedKey = prompt("Masukkan Kode Akses:");
                    if (savedKey === null) {
                        document.body.innerHTML = "<h2 style='padding:20px; text-align:center;'>Akses dibatalkan. Segarkan halaman untuk mencoba lagi.</h2>";
                        return;
                    }
                }

                if (savedKey) {
                    loader.style.display = 'flex';
                    loaderText.innerText = "Memvalidasi Akses...";

                    try {
                        const tempClient = supabase.createClient(SB_URL, savedKey);
                        const { error } = await tempClient.from('sb_sls').select('idsubsls').limit(1);
                        
                        if (!error) {
                            SB_KEY = savedKey;
                            supabaseClient = tempClient;
                            localStorage.setItem("sb_key", SB_KEY);
                            
                            loaderText.innerText = "Memuat peta...";
                            await loadGeoJSON(); 
                            loader.style.display = 'none';
                            break; 
                        } else {
                            loader.style.display = 'none';
                            localStorage.removeItem("sb_key");
                            savedKey = "";
                            alert("Kode tidak valid atau akses ditolak.");
                        }
                    } catch (e) {
                        loader.style.display = 'none';
                        localStorage.removeItem("sb_key");
                        savedKey = "";
                        alert("Terjadi kesalahan saat validasi.");
                    }
                }
            }
        }

        function closeGearPanel() {
            const p = document.getElementById('settings-panel');
            if (p.style.display === 'flex') p.style.display = 'none';
        }

        async function loadGeoJSON() {
            try {
                let dbData = [];
                let from = 0;
                let to = 999;
                let hasMore = true;

                while (hasMore) {
                    const { data, error: fetchError } = await supabaseClient
                        .from('sb_sls')
                        .select('*')
                        .range(from, to);

                    if (fetchError) throw fetchError;

                    dbData = [...dbData, ...data];
                    if (data.length < 1000) hasMore = false;
                    else { from += 1000; to += 1000; }
                }

                supabaseData = dbData;

                const slsRes = await fetch('sls.geojson');
                const slsData = await slsRes.json();
                
                allFeatures = slsData.features.map(f => {
                    const match = supabaseData.find(d => d.idsubsls == f.properties.idsubsls);
                    return { ...f, properties: { ...f.properties, ...(match || {}) } };
                });
                
                slsLayer = L.geoJSON({ type: "FeatureCollection", features: allFeatures }, {
                    style: slsStyle,
                    onEachFeature: function(feature, layer) {
                        if (feature.properties?.nmsls) layer.bindTooltip(feature.properties.nmsls, { sticky: true });
                        layer.on('click', (e) => { 
                            closeGearPanel();
                            highlightFeature(e.target); 
                            updateInfoBox(feature.properties); 
                        });
                    }
                }).addTo(map);

                populateKecamatanDropdown();
                locateUser(true);
            } catch (err) { 
                console.error("Data Error:", err);
                alert("Gagal memuat semua data dari server.");
            }
        }

        function populateKecamatanDropdown() {
            const selKec = document.getElementById('sel-kec');
            const uniqueKec = [...new Set(allFeatures.map(f => `${f.properties.kdkec}|${f.properties.nmkec}`))]
                .filter(i => !i.includes('undefined'))
                .sort((a, b) => a.split('|')[0].localeCompare(b.split('|')[0]));
                
            uniqueKec.forEach(item => {
                const [kd, nm] = item.split('|');
                selKec.add(new Option(`${kd} - ${nm}`, kd));
            });

            selKec.onchange = () => {
                currentKecFilter = selKec.value;
                currentDesaFilters.clear();
                
                if (currentKecFilter) {
                    centerToKecamatan(currentKecFilter);
                    renderDesaCheckboxes();
                    applyFilters();
                } else {
                    resetAllFilters();
                }
            };
        }

        function centerToKecamatan(kdkec) {
            const kecFeatures = allFeatures.filter(f => f.properties.kdkec === kdkec);
            if (kecFeatures.length === 0) return;

            let bounds = L.latLngBounds([]);
            kecFeatures.forEach(f => {
                const layer = L.geoJSON(f);
                bounds.extend(layer.getBounds());
            });

            map.flyToBounds(bounds, { padding: [20, 20], duration: 1.2 });
        }

        function renderDesaCheckboxes() {
            const container = document.getElementById('desa-checkboxes');
            const wrapper = document.getElementById('desa-checkbox-container');
            container.innerHTML = '';

            const filtered = allFeatures.filter(f => f.properties.kdkec === currentKecFilter);
            const uniqueDesa = [...new Set(filtered.map(f => `${f.properties.kddesa}|${f.properties.nmdesa}`))]
                .filter(i => !i.includes('undefined'))
                .sort((a, b) => a.split('|')[0].localeCompare(b.split('|')[0]));

            uniqueDesa.forEach(item => {
                const [kd, nm] = item.split('|');
                const div = document.createElement('div');
                div.className = 'checkbox-item';
                div.innerHTML = `
                    <input type="checkbox" id="desa-${kd}" value="${kd}">
                    <label for="desa-${kd}">${kd} - ${nm}</label>
                `;
                div.querySelector('input').onchange = function() {
                    if (this.checked) currentDesaFilters.add(this.value);
                    else currentDesaFilters.delete(this.value);
                    applyFilters();
                };
                container.appendChild(div);
            });

            wrapper.style.display = 'block';
        }

        function applyFilters() {
            if (!slsLayer) return;

            slsLayer.eachLayer(layer => {
                const props = layer.feature.properties;
                const kecMatch = !currentKecFilter || props.kdkec === currentKecFilter;
                const desaMatch = currentDesaFilters.size === 0 || currentDesaFilters.has(props.kddesa);

                if (kecMatch && desaMatch) {
                    layer.setStyle(slsStyle);
                    layer.options.interactive = true;
                } else {
                    layer.setStyle({ opacity: 0, fillOpacity: 0 });
                    layer.options.interactive = false;
                }
            });
        }

        function resetAllFilters() {
            currentKecFilter = null;
            currentDesaFilters.clear();
            document.getElementById('sel-kec').value = '';
            document.getElementById('desa-checkbox-container').style.display = 'none';
            document.getElementById('desa-checkboxes').innerHTML = '';

            if (slsLayer) {
                slsLayer.eachLayer(layer => {
                    layer.setStyle(slsStyle);
                    layer.options.interactive = true;
                });
            }
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('toast');
                toast.style.display = 'block';
                setTimeout(() => { toast.style.display = 'none'; }, 1000);
            });
        }

        function updateInfoBox(props) {
            const box = document.getElementById('info-box');
            const iidsls = props.idsls || '-';
            const inmsls = props.nmsls || '-';
            box.innerHTML = `
                <b>Nama SLS:</b> ${inmsls} <span class="copy-btn" onclick="copyToClipboard('${inmsls}')" title="Salin Nama SLS">📋</span><br>
                <b>ID SLS:</b> ${iidsls} <span class="copy-btn" onclick="copyToClipboard('${iidsls}')" title="Salin ID">📋</span><br>
                <b>Sub-SLS:</b> ${props.kdsubsls || '-'}<br>
                <b>Kode SLS:</b> ${props.kdsls || '-'}<br>
                <b>Kec:</b> ${(props.kdkec || '')} ${props.nmkec || '-'}<br>
                <b>Desa:</b> ${(props.kddesa || '')} ${props.nmdesa || '-'}
            `;
            box.style.display = 'block';
        }

        function showActiveLabel(targetLayer) {
            activeLabelGroup.clearLayers();
            const targetGeo = targetLayer.toGeoJSON();
            const targetCenter = turf.centerOfMass(targetGeo);
            L.marker([targetCenter.geometry.coordinates[1], targetCenter.geometry.coordinates[0]], {
                icon: L.divIcon({
                    className: 'active-label',
                    html: targetLayer.feature.properties.kdsls || '',
                    iconSize: [40, 20],
                    iconAnchor: [20, 10]
                }),
                interactive: false
            }).addTo(activeLabelGroup);
        }

        function highlightFeature(layer) {
            if (selectedLayer) slsLayer.resetStyle(selectedLayer);
            slsLayer.bringToBack(); 
            selectedLayer = layer;
            selectedLayer.setStyle(slsHighlightStyle);
            selectedLayer.bringToFront();
            showActiveLabel(layer);
        }

        function locateUser(isStartup = false) {
            navigator.geolocation.getCurrentPosition((pos) => {
                const { latitude, longitude } = pos.coords;
                if (userMarker) map.removeLayer(userMarker);
                userMarker = L.marker([latitude, longitude], {
                    icon: L.divIcon({
                        className: 'user-loc',
                        html: '<div style="background:#4285F4; width:18px; height:18px; border-radius:50%; border:3px solid white; box-shadow:0 0 0 4px rgba(66,133,244,0.4);"></div>',
                        iconSize: [24, 24], iconAnchor: [12, 12]
                    })
                }).addTo(map);
                map.setView([latitude, longitude], 16);
                
                const point = turf.point([longitude, latitude]);
                slsLayer.eachLayer(layer => {
                    if (turf.booleanPointInPolygon(point, layer.toGeoJSON())) {
                        highlightFeature(layer);
                        updateInfoBox(layer.feature.properties);
                    }
                });
            }, (err) => { if(!isStartup) alert("Gagal akses lokasi."); }, { enableHighAccuracy: true });
        }

        // Event Listeners
        document.getElementById('gear-btn').onclick = () => {
            const p = document.getElementById('settings-panel');
            p.style.display = p.style.display === 'flex' ? 'none' : 'flex';
        };

        document.getElementById('locate-btn').onclick = () => locateUser(false);

        document.getElementById('reset-filter').onclick = () => {
            resetAllFilters();
        };

        map.on('click', (e) => { 
            if (e.originalEvent.target.id === 'map') { 
                closeGearPanel();
                activeLabelGroup.clearLayers();
                if (selectedLayer) slsLayer.resetStyle(selectedLayer); 
                selectedLayer = null; 
                document.getElementById('info-box').style.display = 'none'; 
            } 
        });

        window.onload = validateAndStart;
    </script>
</body>
</html>
